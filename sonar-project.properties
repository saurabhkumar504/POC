# ---------------------------------------------------------------------------
# SonarQube Community Edition project configuration
# ---------------------------------------------------------------------------
# Static values live in this file. Dynamic values (project version, branch
# name, commit SHA) are passed on the command line by the GitHub Actions
# workflow via `-Dsonar.projectVersion=...` and `-Dsonar.branch.name=...`.
# ---------------------------------------------------------------------------

# --- Project identity ------------------------------------------------------
sonar.projectKey=com.enterprise:employee-management
sonar.projectName=Employee Management Service
sonar.projectDescription=Enterprise Employee Management REST API (Spring Boot 3.3 / Java 21)

# --- Source layout ---------------------------------------------------------
# Sonar scans the source roots for the language below. Tests are scanned
# separately so test code does not count toward "production" coverage or
# quality-gate conditions.
sonar.language=java
sonar.sourceEncoding=UTF-8
sonar.sources=src/main/java
sonar.tests=src/test/java

# Compiled classes are required for accurate symbol resolution (cross-file
# references, type inference) and for JaCoCo coverage correlation.
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes
sonar.java.source=21
sonar.java.target=21

# --- Coverage --------------------------------------------------------------
# JaCoCo's report-xml execution in pom.xml writes
# target/site/jacoco/jacoco.xml; the path below is what the Sonar scanner
# consumes. Both relative and absolute paths are accepted.
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# --- Exclusions ------------------------------------------------------------
# securitygate/* is infra/tooling code, not the application under analysis.
# dto/* are generated-style record DTOs with no business logic.
# Application.java is the Spring Boot entry-point boilerplate.
sonar.exclusions=**/securitygate/**,**/dto/**,**/*Application.java
sonar.test.exclusions=**/securitygate/**
