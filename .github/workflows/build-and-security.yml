name: Enterprise Employee Pipeline
on:
 push:
   branches: [ main, develop ]
 pull_request:
   branches: [ main ]
 workflow_dispatch:
env:
 JAVA_VERSION: "21"
 MAVEN_OPTS: "-Xmx2g -Dmaven.repo.local=${{ github.workspace }}/.m2/repository"
 NVIDIA_API_URL: "https://integrate.api.nvidia.com/v1/chat/completions"
 NVIDIA_MODEL: "meta/llama-3.1-70b-instruct"
jobs:
 # ----------------------------------------------------------------------
 # JOB 1: Build
 # ----------------------------------------------------------------------
 build:
   name: Build
   runs-on: ubuntu-latest
   permissions:
     contents: read
     actions: read
   steps:
     - name: 1. Checkout repository
       uses: actions/checkout@v4
     - name: 2. Setup Java 21
       uses: actions/setup-java@v4
       with:
         java-version: ${{ env.JAVA_VERSION }}
         distribution: temurin
         cache: maven
     - name: 3. Cache Maven dependencies
       uses: actions/cache@v4
       with:
         path: |
           ~/.m2/repository
           ~/.m2/wrapper
         key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
         restore-keys: |
           ${{ runner.os }}-maven-
     - name: 4. Build (skip tests)
       run: mvn -B -ntp -DskipTests package
     - name: 5. Upload JAR artifact
       uses: actions/upload-artifact@v4
       with:
         name: app-jar
         path: target/*.jar
         if-no-files-found: error
         retention-days: 7
 # ----------------------------------------------------------------------
 # JOB 2: Sonar Cloud Scan
 # ----------------------------------------------------------------------
 build-test-sonar:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Build, Test and SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.Sonar_Token }}
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=prj-poc \
            -Dsonar.organization=saurabhkumar504 \
            -Dsonar.host.url=https://sonarcloud.io 
 # ----------------------------------------------------------------------
 # JOB 3: NVIDIA Test Coverage Agent (depends on test-coverage)
 # ----------------------------------------------------------------------
 
 # ----------------------------------------------------------------------
 # JOB 4: Trivy Scan
 # ----------------------------------------------------------------------
 trivy-scan:
   name: Trivy Scan
   runs-on: ubuntu-latest
   needs: sonar-scan
   permissions:
     contents: read
     actions: read
   steps:
     - name: 1. Checkout repository
       uses: actions/checkout@v4
     # trivy-action@v0.30.0 internally calls setup-trivy@v0.2.2, which was
     # never published. Even with skip-setup-trivy: true, GitHub Actions still
     # resolves the action reference at planning time, so we install the Trivy
     # CLI directly via apt and run it ourselves.
     - name: 2. Install Trivy
       run: |
         sudo apt-get update
         sudo apt-get install -y wget gnupg lsb-release
         wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
         echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
         sudo apt-get update