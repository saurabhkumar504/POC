name: Enterprise Employee Pipeline
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
env:
  JAVA_VERSION: "21"
  MAVEN_OPTS: "-Xmx2g -Dmaven.repo.local=${{ github.workspace }}/.m2/repository"
  NVIDIA_API_URL: "https://integrate.api.nvidia.com/v1/chat/completions"
  NVIDIA_MODEL: "meta/llama-3.1-70b-instruct"
  # SonarQube server URL. Configured as a repository variable so it can
  # differ per environment (dev / staging / prod) without code changes.
  # The fallback covers the case where Sonar runs in a Docker container
  # on the same runner.
  SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'http://sonarqube:9000' }}
  SONAR_PLUGIN_VERSION: "3.11.0.3922"
jobs:
  # ----------------------------------------------------------------------
  # JOB 1: Build
  # ----------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
      - name: 2. Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: 3. Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.m2/wrapper
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: 4. Build (skip tests)
        run: mvn -B -ntp -DskipTests package
      - name: 5. Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/employee-management.jar
          if-no-files-found: error
          retention-days: 7
  # ----------------------------------------------------------------------
  # JOB 2: Test & Coverage
  # ----------------------------------------------------------------------
  test-coverage:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: read
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
      - name: 2. Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: 3. Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.m2/wrapper
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: 4. Run Unit Tests
        run: mvn -B -ntp test
      - name: 5. Generate JaCoCo Reports (HTML / XML / CSV)
        run: |
          mvn -B -ntp jacoco:report
          mvn -B -ntp jacoco:report -Dformat=csv
          mvn -B -ntp jacoco:report -Dformat=xml
        continue-on-error: false
      - name: 6. Coverage gate (>= 80%)
        run: |
          if [ -f target/site/jacoco/jacoco.csv ]; then
            COVERAGE=$(awk -F, 'NR>1 && $1=="INSTRUCTION" && $4!="0" {print $4; exit}' target/site/jacoco/jacoco.csv)
            echo "Detected instruction coverage: $COVERAGE%"
            if [ -n "$COVERAGE" ]; then
              COVERAGE_INT=${COVERAGE%.*}
              if [ "$COVERAGE_INT" -lt 80 ]; then
                echo "::error::Coverage $COVERAGE% is below 80% threshold"
                exit 1
              else
                echo "::notice::Coverage $COVERAGE% meets >=80% gate"
              fi
            fi
          else
            echo "::error::JaCoCo CSV not found"
            exit 1
          fi
      - name: 7. Upload JaCoCo + JUnit reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            target/site/jacoco/**
            target/surefire-reports/**
          if-no-files-found: error
          retention-days: 30
  # ----------------------------------------------------------------------
  # JOB 4: SonarQube Analysis + Quality Gate
  # ----------------------------------------------------------------------
  # Runs after test-coverage so it can pick up target/site/jacoco/jacoco.xml
  # from the `coverage-reports` artifact. The Quality Gate is a HARD gate:
  # if it fails, the step exits non-zero and GitHub skips every job that
  # lists `sonarqube` in its `needs:`. That includes codeql, trivy-scan,
  # nvidia-security-agent, nvidia-remediation-agent, security-gate, and
  # deploy — satisfying the "stop the pipeline immediately" requirement.
  # ----------------------------------------------------------------------
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: test-coverage
    permissions:
      contents: read
      actions: read
    env:
      SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is required for SonarQube's blame-based
          # "new code" analysis. Without full history, the scanner
          # cannot attribute lines to the current commit.
          fetch-depth: 0
      - name: 2. Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: 3. Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.m2/wrapper
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: 4. Download coverage artifact (JaCoCo XML)
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: target
        continue-on-error: true
      - name: 5. Build (skip tests, keep JaCoCo binary)
        # Re-compile the main sources so sonar.java.binaries resolves.
        # -DskipTests preserves the JaCoCo coverage data already on disk.
        run: mvn -B -ntp -DskipTests package
      - name: 6. Run SonarQube scan
        env:
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn -B -ntp -DskipTests \
            -Dsonar.projectVersion=${{ github.sha }} \
            -Dsonar.branch.name=${{ github.ref_name }} \
            org.sonarsource.scanner.maven:sonar-maven-plugin:${SONAR_PLUGIN_VERSION}:sonar
      - name: 7. Wait for Quality Gate result
        # Official SonarQube action. Polls the server for the report's
        # Quality Gate status and exits non-zero if the gate fails.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          timeout: 300
      - name: 8. Publish SonarQube summary to workflow log
        if: always()
        run: |
          if [ "${{ steps.sonar-quality-gate-action.outputs.conclusion }}" = "success" ]; then
            echo "## ✅ SonarQube Quality Gate: PASS" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ SonarQube Quality Gate: FAIL" >> $GITHUB_STEP_SUMMARY
            echo "Visit ${{ env.SONAR_HOST_URL }}/dashboard?id=com.enterprise%3Aemployee-management" >> $GITHUB_STEP_SUMMARY
          fi
      - name: 9. Upload SonarQube report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-report
          path: |
            target/sonar/
            .scannerwork/
          if-no-files-found: warn
          retention-days: 30
  # ----------------------------------------------------------------------
  # JOB 5: NVIDIA Test Coverage Agent (depends on sonarqube)
  # ----------------------------------------------------------------------
  nvidia-test-agent:
    name: NVIDIA Test Coverage Agent
    runs-on: ubuntu-latest
    needs: test-coverage
    permissions:
      contents: read
      actions: read
    if: always()
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 3. Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: target
        continue-on-error: false
      - name: 4. Run NVIDIA Test Coverage Agent
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          mkdir -p reports
          python3 scripts/test-agent.py \
            --junit target/surefire-reports \
            --jacoco target/site/jacoco/jacoco.csv \
            --source src/main/java \
            --output reports/coverage-summary.md || echo "Test agent failed - continuing"
      - name: 5. Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: nvidia-coverage-summary
          path: reports/coverage-summary.md
          if-no-files-found: warn
          retention-days: 30
  # ----------------------------------------------------------------------
  # JOB 6: Trivy Scan (depends on sonarqube)
  # ----------------------------------------------------------------------
  trivy-scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: [build, test-coverage, sonarqube]
    permissions:
      contents: read
      actions: read
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
      # trivy-action@v0.30.0 internally calls setup-trivy@v0.2.2, which was
      # never published. Even with skip-setup-trivy: true, GitHub Actions still
      # resolves the action reference at planning time, so we install the Trivy
      # CLI directly via apt and run it ourselves.
      - name: 2. Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version
      - name: 3. Trivy Filesystem Scan
        # --skip-pom-check avoids the 429s we hit from repo.maven.apache.org
        # when Trivy tries to resolve every <dependency> in pom.xml cold. The
        # trade-off is no pom-based offline CVE matching for the libs we
        # declare; we still get OS-pkg and secret findings for the source tree.
        # The Java dependency vulnerability surface is covered separately by
        # the CodeQL job and the NVIDIA Security Review Agent.
        run: |
          trivy fs \
            --format json \
            --output trivy-report.json \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --ignore-unfixed \
            --skip-pom-check \
            --scanners vuln,secret \
            .
        continue-on-error: true
      - name: 4. Trivy Image Scan (best effort)
        run: |
          trivy image \
            --format json \
            --output trivy-image-report.json \
            --severity CRITICAL,HIGH \
            eclipse-temurin:21-jre-jammy
        continue-on-error: true
      - name: 5. Trivy gate (no Critical / High)
        # Best-effort gate: if the FS scan produced a report, fail on
        # Critical/High findings. If no report exists (e.g. Trivy bailed on a
        # rate limit before writing one), warn instead of failing — the image
        # scan and CodeQL/NVIDIA agents still cover the dependency surface.
        run: |
          if [ ! -f trivy-report.json ]; then
            echo "::warning::Trivy filesystem report not produced - skipping gate"
            exit 0
          fi
          CRIT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json 2>/dev/null || echo 0)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-report.json 2>/dev/null || echo 0)
          echo "Critical=$CRIT High=$HIGH"
          if [ "$CRIT" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "::error::Critical=$CRIT, High=$HIGH vulnerabilities present"
            exit 1
          else
            echo "::notice::No Critical or High vulnerabilities"
          fi
      - name: 6. Upload Trivy reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-report.json
            trivy-image-report.json
          if-no-files-found: warn
          retention-days: 30
  # ----------------------------------------------------------------------
  # JOB 7: NVIDIA Security Review Agent (depends on sonarqube)
  # ----------------------------------------------------------------------
  nvidia-security-agent:
    name: NVIDIA Security Review Agent
    runs-on: ubuntu-latest
    needs: [trivy-scan, sonarqube]
    permissions:
      contents: read
      actions: read
    if: always()
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 3. Download Trivy artifact
        uses: actions/download-artifact@v4
        with:
          name: trivy-reports
          path: .
        continue-on-error: false
      - name: 4. Run NVIDIA Security Review Agent
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          mkdir -p reports
          if [ -f trivy-report.json ]; then
            python3 scripts/security-agent.py \
              --trivy trivy-report.json \
              --pom pom.xml \
              --dockerfile Dockerfile \
              --config src/main/resources/application.yml \
              --source src/main/java \
              --output reports/security-report.md \
              --json-output reports/security-report.json || echo "Security agent failed - continuing"
          else
            echo "# Security Report" > reports/security-report.md
            echo "Trivy report not available." >> reports/security-report.md
            # Even without Trivy, emit a JSON scaffold so the Security Gate can
            # process the NVIDIA report deterministically.
            echo '{"status":"PASS","critical":0,"high":0,"medium":0,"low":0,"riskScore":0,"summary":"Trivy report not available.","recommendations":["Re-run Trivy to populate baseline findings."],"generatedAt":"'$(date -u +%FT%TZ)'"}' > reports/security-report.json
          fi
      - name: 5. Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: nvidia-security-report
          path: |
            reports/security-report.md
            reports/security-report.json
          if-no-files-found: warn
          retention-days: 30
  # ----------------------------------------------------------------------
  # JOB 8: NVIDIA Auto Remediation Agent (depends on sonarqube)
  # ----------------------------------------------------------------------
  nvidia-remediation-agent:
    name: NVIDIA Auto Remediation Agent
    runs-on: ubuntu-latest
    needs: [trivy-scan, nvidia-security-agent, sonarqube]
    permissions:
      contents: read
      actions: read
    if: always()
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 3. Download Trivy artifact
        uses: actions/download-artifact@v4
        with:
          name: trivy-reports
          path: .
        continue-on-error: false
      - name: 4. Download security report artifact
        uses: actions/download-artifact@v4
        with:
          name: nvidia-security-report
          path: reports
        continue-on-error: false
      - name: 5. Run NVIDIA Auto Remediation Agent
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          if [ -f trivy-report.json ]; then
            python3 scripts/security-fix-agent.py \
              --trivy trivy-report.json \
              --security-report reports/security-report.md \
              --pom pom.xml \
              --dockerfile Dockerfile \
              --source src/main/java \
              --config src/main/resources/application.yml \
              --output-dir reports/ || echo "Remediation agent failed - continuing"
          fi
      - name: 6. Upload remediation reports
        uses: actions/upload-artifact@v4
        with:
          name: nvidia-remediation-reports
          path: reports/security-fix-summary.md
          if-no-files-found: warn
          retention-days: 30
  # ----------------------------------------------------------------------
  # JOB 9: CodeQL Analysis (depends on sonarqube)
  # ----------------------------------------------------------------------
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    needs: [build, test-coverage, sonarqube]
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
      - name: 2. Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: 3. Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-and-quality
      - name: 4. Build for CodeQL
        run: mvn -B -ntp -DskipTests package
        continue-on-error: true
      - name: 5. Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"
          output: codeql-results.sarif
        continue-on-error: true
      - name: 6. Upload CodeQL SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: codeql-results.sarif
        continue-on-error: true
      - name: 7. Upload CodeQL SARIF artifact (for Security Gate)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: codeql-results.sarif
          if-no-files-found: warn
          retention-days: 30
  # ----------------------------------------------------------------------
  # JOB 10: Aggregate & Upload All Reports (depends on sonarqube)
  # ----------------------------------------------------------------------
  upload-reports:
    name: Aggregate & Upload Reports
    runs-on: ubuntu-latest
    needs: [build, test-coverage, nvidia-test-agent, trivy-scan, nvidia-security-agent, nvidia-remediation-agent, codeql, security-gate, sonarqube]
    if: always()
    permissions:
      contents: read
      actions: read
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
      - name: 2. Download every artifact
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true
      - name: 3. Re-run all NVIDIA agents in one place (combined)
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          mkdir -p reports
          cp -r artifacts/nvidia-coverage-summary/* reports/ 2>/dev/null || true
          cp -r artifacts/nvidia-security-report/* reports/ 2>/dev/null || true
          cp -r artifacts/nvidia-remediation-reports/* reports/ 2>/dev/null || true
          cp -r artifacts/coverage-reports/site/jacoco target/ 2>/dev/null || true
          cp artifacts/coverage-reports/surefire-reports target/ 2>/dev/null || true
          ls -la reports
        continue-on-error: true
      - name: 4. Publish enterprise-reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-reports
          path: |
            reports/**
            trivy-report.json
            codeql-results.sarif
          if-no-files-found: warn
          retention-days: 30
  # ----------------------------------------------------------------------
  # JOB 11: Security Gate (aggregates CodeQL + Trivy + NVIDIA -> PASS/FAIL)
  # ----------------------------------------------------------------------
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [codeql, trivy-scan, nvidia-security-agent, sonarqube]
    if: always()
    permissions:
      contents: read
      actions: read
      security-events: read
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4
      - name: 2. Setup Java 21 (for Security Gate utility)
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: 3. Download CodeQL SARIF
        uses: actions/download-artifact@v4
        with:
          name: codeql-sarif
          path: .
        continue-on-error: true
      - name: 4. Download Trivy reports
        uses: actions/download-artifact@v4
        with:
          name: trivy-reports
          path: .
        continue-on-error: true
      - name: 5. Download NVIDIA Security Agent report
        uses: actions/download-artifact@v4
        with:
          name: nvidia-security-report
          path: .
        continue-on-error: true
      - name: 6. Locate scanner outputs
        id: locate
        run: |
          echo "codeql=$(ls codeql-results.sarif 2>/dev/null || echo MISSING)" >> $GITHUB_OUTPUT
          echo "trivy=$(ls trivy-report.json 2>/dev/null || echo MISSING)"  >> $GITHUB_OUTPUT
          echo "nvidia=$(ls security-report.json 2>/dev/null || echo MISSING)" >> $GITHUB_OUTPUT
          ls -la
      - name: 7. Build Security Gate utility
        run: mvn -B -ntp -q -DskipTests -Dformat=jar compile
      - name: 8. Run Security Gate
        id: gate
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set +e
          java -cp target/classes:$(mvn -q -DincludeScope=runtime -Dmdep.outputFile=/dev/stdout dependency:build-classpath 2>/dev/null) \
            com.enterprise.securitygate.SecurityGate \
              --codeql codeql-results.sarif \
              --trivy  trivy-report.json \
              --nvidia security-report.json \
              --report SECURITY_GATE_REPORT.md \
              --json   security-gate.json \
              --commit "$GITHUB_SHA"
          GATE_EXIT=$?
          echo "exit-code=$GATE_EXIT" >> $GITHUB_OUTPUT
          # Set a workflow output the deploy job's `if:` can read.
          if [ "$GATE_EXIT" -eq 0 ]; then
            echo "decision=PASS" >> $GITHUB_OUTPUT
          else
            echo "decision=FAIL" >> $GITHUB_OUTPUT
          fi
          exit $GATE_EXIT
      - name: 9. Publish SECURITY_GATE_REPORT.md + security-gate.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-gate-report
          path: |
            SECURITY_GATE_REPORT.md
            security-gate.json
          if-no-files-found: warn
          retention-days: 90
  # ----------------------------------------------------------------------
  # JOB 12: Deploy (only when every gate passes)
  # ----------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    needs: [build, test-coverage, trivy-scan, codeql, security-gate, sonarqube]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.build.result == 'success' &&
      needs.test-coverage.result == 'success' &&
      needs.trivy-scan.result == 'success' &&
      needs.codeql.result == 'success' &&
      needs.security-gate.result == 'success' &&
      needs.sonarqube.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 1. Deploy
        run: |
          echo "Build, test, coverage, SonarQube, security, codeql and Security Gate all passed."
          echo "Deploying Employee Management service to production."
          # Replace with actual deployment steps (kubectl apply, helm upgrade, etc.)
          echo "::notice::Deployment simulated for demonstration pipeline."